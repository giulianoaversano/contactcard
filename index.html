<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Giuliano Aversano</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg1:#78b3a5;
      --bg2:#4b6db6;
      --text:#ffffff;
      --card:#ffffff;
      --muted:#6b7280;
      --line:#e5e7eb;
      --accent:#4b6db6;
      --btn:#111827;
    }

    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 55%, #f6f7fb 55%, #f6f7fb 100%);
      color:#111;
    }

    .wrap{
      max-width: 520px;
      margin: 0 auto;
      padding: 34px 18px 28px;
    }

    .header{
      text-align:center;
      color: var(--text);
      padding-bottom: 18px;
    }

    .avatar{
      width: 112px;
      height: 112px;
      border-radius: 999px;
      border: 5px solid rgba(255,255,255,.95);
      object-fit: cover;
      box-shadow: 0 12px 28px rgba(0,0,0,.18);
    }

    .name{
      margin: 14px 0 4px;
      font-weight: 600;
      letter-spacing: -0.02em;
      font-size: 26px;
      line-height: 1.2;
    }

    .title{
      margin: 0;
      font-weight: 400;
      font-size: 15px;
      opacity: .92;
    }

    .company{
      margin-top: 6px;
      font-weight: 300;
      font-size: 13px;
      opacity: .85;
    }

    .quick-actions{
      display:flex;
      justify-content:center;
      gap: 12px;
      margin-top: 16px;
    }

    .chip{
      width: 52px;
      height: 52px;
      border-radius: 999px;
      background: rgba(255,255,255,.92);
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow: 0 10px 20px rgba(0,0,0,.12);
      text-decoration:none;
    }

    .chip svg{ width: 22px; height: 22px; stroke: var(--accent); }

    .card{
      margin-top: 18px;
      background: var(--card);
      border-radius: 18px;
      padding: 14px;
      box-shadow: 0 18px 40px rgba(17,24,39,.10);
      border: 1px solid rgba(255,255,255,.6);
    }

    .row{
      display:flex;
      gap: 12px;
      align-items:center;
      padding: 12px 8px;
    }
    .row + .row{ border-top: 1px solid var(--line); }

    .ico{
      width: 38px;
      height: 38px;
      border-radius: 999px;
      background: #f3f4f6;
      display:flex;
      align-items:center;
      justify-content:center;
      flex: 0 0 38px;
    }
    .ico svg{ width: 18px; height: 18px; stroke: #6b7280; }

    .meta{
      text-align:left;
      flex: 1 1 auto;
      min-width: 0;
    }
    .label{
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 2px;
    }
    .value{
      font-size: 15px;
      font-weight: 600;
      color:#111827;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }

    .link{
      text-decoration:none;
      color: inherit;
    }

    .section-title{
      margin: 18px 0 10px;
      font-size: 14px;
      color: #111827;
      font-weight: 600;
    }

    .external{
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px 12px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 10px;
      text-decoration:none;
      color:#111827;
      box-shadow: 0 12px 30px rgba(17,24,39,.06);
    }

    .ext-left{
      display:flex;
      align-items:center;
      gap: 10px;
      min-width: 0;
    }

    .badge{
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: #eef2ff;
      display:flex;
      align-items:center;
      justify-content:center;
      flex: 0 0 40px;
    }

    .badge svg{ width: 22px; height: 22px; }

    .ext-text{
      text-align:left;
      min-width:0;
    }
    .ext-text .big{
      font-weight: 600;
      font-size: 14px;
      line-height: 1.1;
    }
    .ext-text .small{
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }

    .arrow{
      width: 20px;
      height: 20px;
      stroke: #9ca3af;
      flex: 0 0 20px;
    }

    .cta{
      margin-top: 14px;
      width:100%;
      border: none;
      border-radius: 14px;
      padding: 16px 14px;
      background: var(--btn);
      color: #fff;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      gap: 10px;
      text-decoration:none;
      box-shadow: 0 16px 30px rgba(17,24,39,.18);
    }
    .cta:hover{ opacity:.92; }

    .cta svg{ width: 18px; height: 18px; stroke: #fff; }

    .foot{
      text-align:center;
      font-size: 12px;
      color:#6b7280;
      margin-top: 14px;
    }
  </style>
</head>
<body>
